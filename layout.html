<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Телефоны и абоненты" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
  </head>
  <body class="modern">
    <div class="app-shell">
      <nav class="navbar navbar-expand-lg navbar-clean">
        <div class="container">
          <a class="navbar-brand" href="{{ url_for('home') }}">
            <span class="brand-mark">Телефоны и абоненты</span>
          </a>
          {% if current_role %}
            <div class="navbar-nav nav-pills-custom ms-auto">
              <a class="nav-link {% if request.endpoint and request.endpoint.startswith('subscribers') %}active{% endif %}" href="{{ url_for('subscribers_list') }}">Абоненты</a>
              <a class="nav-link {% if request.endpoint and request.endpoint.startswith('phones') %}active{% endif %}" href="{{ url_for('phones_list') }}">Телефоны</a>
            </div>
            <div class="d-flex align-items-center gap-2 ms-3">
              <span class="role-badge">Роль: {{ "Админ" if is_admin else "Клиент" }}</span>
              <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('logout') }}" data-confirm-logout="1">Выйти</a>
            </div>
          {% endif %}
        </div>
      </nav>

      <main class="container py-4">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("form[data-confirm-save='1']").forEach((form) => {
          form.addEventListener("submit", (event) => {
            if (!confirm("Вы точно хотите изменить и сохранить?")) {
              event.preventDefault();
            }
          });
        });

        document.querySelectorAll("a[data-confirm-exit='1']").forEach((link) => {
          link.addEventListener("click", (event) => {
            if (!confirm("Вы хотите выйти без сохранения изменений?")) {
              event.preventDefault();
            }
          });
        });

        document.querySelectorAll("a[data-confirm-logout='1']").forEach((link) => {
          link.addEventListener("click", (event) => {
            if (!confirm("Вы хотите выйти из системы?")) {
              event.preventDefault();
            }
          });
        });
      });
    </script>
  </body>
</html>
