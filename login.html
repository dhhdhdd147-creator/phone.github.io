{% extends "layout.html" %}

{% block content %}
  <div class="page-card card auth-card">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">Вход в систему</h1>
      <p class="text-muted mb-4">Выберите часть системы, в которую хотите войти.</p>

      <form method="post" class="d-grid gap-2">
        <button class="btn btn-primary" type="submit" name="role" value="admin">Войти как админ</button>
        <button class="btn btn-outline-primary" type="submit" name="role" value="client">Войти как клиент</button>
      </form>
    </div>
  </div>
{% endblock %}
